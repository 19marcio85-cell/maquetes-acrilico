<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maquetes Acrílico Pro | Oficina 3D</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1e8e3e; --bg: #f8f9fa; --panel: #ffffff; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg); display: flex; height: 100vh; overflow: hidden; }
        
        /* Painel Lateral */
        .sidebar { width: 400px; background: var(--panel); border-right: 1px solid #ddd; display: flex; flex-direction: column; box-shadow: 2px 0 10px rgba(0,0,0,0.05); z-index: 10; }
        .sidebar-content { padding: 20px; overflow-y: auto; flex: 1; }
        h2 { font-size: 18px; margin-top: 0; color: #333; border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
        
        .group { margin-bottom: 20px; }
        label { display: block; font-size: 12px; font-weight: 600; color: #666; margin-bottom: 8px; text-transform: uppercase; }
        
        textarea { width: 100%; height: 100px; padding: 12px; border: 1px solid #ddd; border-radius: 8px; resize: none; font-size: 13px; background: #fdfdfd; box-sizing: border-box; }
        select, input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; box-sizing: border-box; }
        
        .row { display: flex; gap: 10px; margin-bottom: 10px; }
        .row > div { flex: 1; }

        .btn-print { background: var(--primary); color: white; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-print:hover { background: #15652c; }

        /* Área Visual */
        .viewport { flex: 1; position: relative; background: #ffffff; }
        #canvas-container { width: 100%; height: 100%; }
        
        /* Etiquetas de Cotas */
        .cota-label { position: absolute; background: rgba(0,0,0,0.7); color: white; padding: 2px 6px; border-radius: 4px; font-size: 11px; pointer-events: none; transform: translate(-50%, -50%); }
        
        .product-badge { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.9); padding: 10px 20px; border-radius: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: 1px solid var(--primary); font-weight: bold; }

        @media print {
            .sidebar { display: none; }
            .viewport { width: 100vw; height: 100vh; }
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-content">
        <h2>MAQUETE COMERCIAL</h2>
        
        <div class="group">
            <label>Texto do Cliente (Copy-Paste)</label>
            <textarea placeholder="Cole aqui o descritivo do cliente..."></textarea>
        </div>

        <div class="group">
            <label>Categoria de Produto</label>
            <select id="tipo" onchange="initGeometry()">
                <option value="caixa">Caixa / Urna Simples</option>
                <option value="dobradica">Caixa com Dobradiças</option>
                <option value="expositor">Expositor em Degraus</option>
                <option value="mesa">Mesa / Suporte</option>
                <option value="claraboia">Claraboia (Pirâmide)</option>
                <option value="trofeu">Troféu com Base</option>
                <option value="regua">Régua / Moldura L</option>
                <option value="podium">Podium Cilíndrico</option>
                <option value="tabuleiro">Tabuleiro</option>
            </select>
        </div>

        <div class="group">
            <label>Dimensões Finais (mm)</label>
            <div class="row">
                <div><label>Largura (X)</label><input type="number" id="X" value="300" oninput="updateGeometry()"></div>
                <div><label>Altura (Z)</label><input type
